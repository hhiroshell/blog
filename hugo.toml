baseURL = "https://alpaca-lab.dev/"
title = "alpaca-lab.dev"
theme = ["PaperMod"]
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[languages.en]
  contentDir = "content/en"
  languageName = "English"
  weight = 1

  [languages.en.params]
    [languages.en.params.homeInfoParams]
      Title = "Hi there"
      Content = "Welcome to my blog."

  [[languages.en.menus.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[languages.en.menus.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

[languages.ja]
  contentDir = "content/ja"
  languageName = "日本語"
  weight = 2

  [languages.ja.params]
    [languages.ja.params.homeInfoParams]
      Title = "こんにちは"
      Content = "ブログへようこそ。"

  [[languages.ja.menus.main]]
    identifier = "posts"
    name = "記事"
    url = "/posts/"
    weight = 10

  [[languages.ja.menus.main]]
    identifier = "tags"
    name = "タグ"
    url = "/tags/"
    weight = 20

[params]
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.author]
    name = "hhiroshell"
